<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <!-- 1. ADICIONADO: Esta linha impede que o site fique minúsculo no celular -->
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pesquisa da Detetive</title>

    <!-- Font Awesome para carregar o ícone do idioma pulando -->
    <link rel="stylesheet" href="https://cloudflare.com">

    <style>   
        /* Centraliza e organiza o título e o mini botão lado a lado */
        .cabecalho {
            position: relative;
            padding-right: 120px; /* Cria espaço na direita para o botão não bater no texto */
        }

        .mini-btn-tradutor {
            position: absolute;
            top: 50%;
            transform: translateY(-50%);
            right: 15px;
            background-color: #f0f4f8;
            border: 1px solid #dcdcdc;
            color: #333333;
            border-radius: 20px;
            padding: 5px 12px;
            font-family: Arial, sans-serif;
            font-size: 12px;
            font-weight: 600;
            text-decoration: none;
            display: inline-flex;
            align-items: center;
            gap: 5px;
            cursor: pointer;
            transition: all 0.2s ease;
        }

        .mini-btn-tradutor:hover {
            background-color: #008CBA;
            color: white;
            border-color: #008CBA;
        }

        body {
            font-family: Arial, sans-serif;
            padding: 20px;
            background-color: #f9f9f9;
        }

        /* Estilo do botão de pesquisar (Versão de Computador) */
        #btnEndereco {
            background-color: #008CBA; /* Cor azul moderna */
            color: white;              /* Letra branca */
            border: none;              /* Remove a borda padrão */
            padding: 12px 24px;        /* Deixa o botão gordinho */
            border-radius: 6px;        /* Cantos arredondados */
            font-size: 16px;           /* Tamanho da letra */
            cursor: pointer;           /* Mãozinha de clique */
            
            /* Posicionamento na frente da detetive */
            margin-left: 20px;         /* Afasta o botão da imagem */
            vertical-align: middle;    /* CORRIGIDO: Alinha com o meio da imagem */
            margin-bottom: 15px; 
        }

        /* Efeito de acender ao passar o mouse */
        #btnEndereco:hover {
            background-color: #005f7a; /* Azul mais escuro */
        }

        /* Garante que a imagem fique alinhada com o botão */
        img {
            vertical-align: middle;    /* CORRIGIDO: Alinha com o meio do botão */
            max-width: 100%;
            height: auto;
        }

        /* 2. ADICIONADO: CONFIGURAÇÃO EXCLUSIVA PARA CELULAR */
        @media (max-width: 768px) {
            body {
                text-align: center; /* Centraliza o título e os elementos no celular */
            }

            img {
                display: block;
                margin: 0 auto 20px auto; /* Centraliza a detetive e joga o botão para baixo */
                width: 180px; /* Deixa a detetive em um tamanho ótimo na tela do celular */
            }

            #btnEndereco {
                margin-left: 0; /* Tira o afastamento lateral do computador */
                width: 100%;    /* O botão ocupa a largura da tela para facilitar o toque */
                max-width: 280px; /* Impede o botão de ficar gigante para os lados */
                display: inline-block;
            }
        }

        /* contencao para empilhar novos botoes*/
        .botoes-container {
            text-align: center; /* centralizar o bloco */
            margin-top: 20px; /* para dar espaco entre os botoes */
        }

        /* estilo dos novos botoes (metro) */
        #btnMetro {
            background-color: #4CAF50; /* verde */
            color: white;
            border: none;
            border-radius: 6px; 
            padding: 12px 55px;
            font-size: 16px;
            cursor: pointer;
        }

        #btnMetro:hover {
            background-color: #3e8e41;
        }

        /* Esconde a palavra traduzir no celular para manter o layout limpo */
        @media (max-width: 480px) {
            .mini-btn-tradutor span {
                display: none;
            }
            .mini-btn-tradutor {
                padding: 6px 10px;
            }
        }
    </style>       
</head>
<body>  

<div class="cabecalho">   
    <h1>Onde quer ir?</h1>

    <!-- icone de tradução -->
    <a href="#" onclick="document.querySelector('.goog-te-menu-value').click(); return false;" class="mini-btn-tradutor">
        <i class="fa-solid fa-language fa-bounce"></i> <span>Traduzir</span>    
    </a>
</div>

<!-- Elemento invisivel do tradutor e o script do Google -->
<div id="google_translate_element" style="display:none;"></div>
<script type="text/javascript">
function googleTranslateElementInit() {
  new google.translate.TranslateElement({
    pageLanguage: 'pt',
    includedLanguages: 'en,es,ja,fr,de',
    layout: google.translate.TranslateElement.InlineLayout.SIMPLE
  }, 'google_translate_element');
}
</script>
<script type="text/javascript" src="//://google.com"></script>
    
<!-- 1. A Detetive vem primeiro -->
<img src="https://blogger.googleusercontent.com/img/b/R29vZ2xl/AVvXsEiuNVEdQJVsKEiZPcOaIa6pcT7UoS1sp6TwV07gXM19X9MtzVBJdw_6qCW58vpyOm7XMmm9tg6hxTW4SFHLEADBihfVhIhkQCYkzy0oJMU7HcGZ2nuwKn5kFwjZemYmqQvBtq57dvTP-HU/s800/job_tantei_woman.png" alt="Detetive procurando erros" width="200">

<!-- 2. O único botão de pesquisar vem logo na frente dela -->
<button id="btnEndereco">pesquise endereço</button>

<!-- botoes do metro -->
<div class="botoes-container">
    <button id="btnMetro">Linhas de Metrô (Japão)</button>
</div>

<!-- O JavaScript que faz o botão abrir o Google Maps e JREast -->
<script>
    const botaoEndereco = document.getElementById('btnEndereco');
    botaoEndereco.addEventListener('click', () => {
        window.open('https://www.google.com/maps/@35.9111618,139.6197098,15z?entry=ttu&g_ep=EgoyMDI2MDUyNy4wIKXMDSoASAFQAw%3D%3D', '_blank');
    });

    const botaoMetro = document.getElementById('btnMetro');
    botaoMetro.addEventListener('click', () => {
        window.open('https://www.jreast.co.jp/map', '_blank');
    });
</script>

</body>
</html>
